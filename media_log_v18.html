<link rel="stylesheet" href="https://unpkg.com/@fontsource/playfair-display@5.0.18/700.css">
<style>
*{box-sizing:border-box}
.tbtn{background:transparent;border:none;padding:6px 14px;cursor:pointer;font-size:14px;color:var(--color-text-secondary);font-family:inherit;border-radius:20px}
.tbtn.on{font-weight:500;color:#fff}
.cat-tile{border-radius:var(--border-radius-lg);padding:.9rem 1rem;cursor:pointer;border:2px solid transparent}
.cat-tile:hover{opacity:.85}
.cat-tile.sel{border-color:rgba(0,0,0,.25)}
.sc{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;line-height:1.5}
.acrd{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
.mwrap{display:none;background:rgba(0,0,0,.5);border-radius:var(--border-radius-lg);margin-bottom:1.5rem;padding:1.5rem;align-items:flex-start;justify-content:center;min-height:440px}
.mbox{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);padding:1.5rem;width:100%;max-width:400px}
input,select,textarea{box-sizing:border-box;width:100%}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.btrack{flex:1;height:14px;border-radius:3px;background:rgba(0,0,0,.07);overflow:hidden;display:flex}
.icnbtn{border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;padding:0;display:flex;align-items:center;justify-content:center;font-family:inherit;opacity:.85}
.icnbtn:hover{opacity:1}
.cthumb{width:100%;height:100%;object-fit:cover;display:block}
</style>

<div id="mwrap" class="mwrap">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <span id="mtitle" style="font-size:16px;font-weight:500;color:var(--color-text-primary)">Add entry</span>
      <button onclick="closeM()" style="background:none;border:none;cursor:pointer;font-size:22px;color:var(--color-text-secondary);line-height:1;padding:0">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Type</div><select id="ft" onchange="updLbl()"><option value="book">Book</option><option value="music">Music / album</option><option value="tv">TV show</option><option value="movie">Movie</option><option value="concert">Concert / live event</option></select></div>
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Title</div><input id="ftitle" type="text" placeholder="Title..."><div id="terr" style="font-size:13px;color:var(--color-text-danger);margin-top:3px;display:none">Required.</div></div>
      <div><div id="clbl" style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Author</div><input id="fcreator" type="text"></div>
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Status</div><select id="fstatus"><option value="consuming">Currently consuming</option><option value="backlog">Backlog / want to</option><option value="completed">Completed</option><option value="dnf">Did not finish</option></select></div>
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Rating</div><div id="si" style="display:flex;gap:3px"></div></div>
      <div><div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:3px">Notes</div><textarea id="fnotes" rows="2" style="resize:vertical"></textarea></div>
      <div style="display:flex;gap:8px;margin-top:4px"><button onclick="saveE()" style="flex:1" id="savebtn">Save</button><button onclick="closeM()" style="flex:1">Cancel</button></div>
    </div>
  </div>
</div>

<div style="padding-top:.25rem">
  <div style="border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:1.5rem;background:#26215C">
    <div style="display:flex;height:6px">
      <div style="flex:1;background:#BA7517"></div><div style="flex:1;background:#7F77DD"></div>
      <div style="flex:1;background:#1D9E75"></div><div style="flex:1;background:#378ADD"></div>
      <div style="flex:1;background:#D85A30"></div>
    </div>
    <div style="padding:1.4rem 1.5rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
        <div>
          <div style="font-size:12px;font-weight:500;letter-spacing:.12em;color:#AFA9EC;text-transform:uppercase;margin-bottom:.2rem">Grace's</div>
          <div style="font-family:'Playfair Display',Georgia,serif;font-size:38px;font-weight:700;color:#fff;line-height:1;margin-bottom:.8rem">Media log</div>
          <div id="hdr-stats" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center"></div>
        </div>
        <div style="display:flex;gap:8px;padding-top:4px">
          <button onclick="doExport()" style="font-size:13px;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25);color:#CECBF6">Export ↓</button>
          <button onclick="openM(null)" style="font-size:13px;background:#7F77DD;border-color:#7F77DD;color:#fff;font-weight:500">+ Add</button>
        </div>
      </div>
    </div>
  </div>
  <div id="tiles" style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:1.5rem"></div>
  <div style="display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:12px;margin-bottom:12px">
    <div class="acrd">
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:.85rem">By category</div>
      <div id="cchart"></div>
      <div style="display:flex;gap:12px;margin-top:.75rem;flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary)"><span style="width:9px;height:9px;border-radius:2px;background:#185FA5;display:inline-block"></span>Done</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary)"><span style="width:9px;height:9px;border-radius:2px;background:#639922;display:inline-block"></span>Now</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary)"><span style="width:9px;height:9px;border-radius:2px;background:#B4B2A9;display:inline-block"></span>Backlog</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--color-text-secondary)"><span style="width:9px;height:9px;border-radius:2px;background:#E24B4A;display:inline-block"></span>DNF</span>
      </div>
    </div>
    <div class="acrd">
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:.85rem">Ratings</div>
      <div id="rchart" style="display:flex;align-items:flex-end;gap:4px;height:100px"></div>
    </div>
  </div>
  <div class="acrd" style="margin-bottom:1.5rem">
    <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:.75rem">Top picks (4+ stars)</div>
    <div id="tops"></div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:.75rem">
    <span style="font-size:13px;color:var(--color-text-tertiary);margin-right:2px">Filter:</span>
    <div id="stabs" style="display:flex;flex-wrap:wrap;gap:5px"></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span id="cnt" style="font-size:14px;color:var(--color-text-secondary)"></span>
    <select id="srt" onchange="render()" style="font-size:13px;width:auto"><option value="d-">Newest first</option><option value="d+">Oldest first</option><option value="r-">Top rated</option><option value="az">A–Z</option></select>
  </div>
  <div id="cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px"></div>
  <div id="empty" style="display:none;text-align:center;padding:3rem;color:var(--color-text-secondary)">Nothing here yet.</div>
</div>

<script id="mainscript">
var CATS={book:{l:'Books',sl:'Book',e:'📚',bg:'#FAEEDA',hd:'#EF9F27',tx:'#633806',dot:'#BA7517',cl:'Author'},music:{l:'Music',sl:'Music',e:'🎵',bg:'#EEEDFE',hd:'#7F77DD',tx:'#3C3489',dot:'#534AB7',cl:'Artist'},tv:{l:'TV',sl:'TV show',e:'📺',bg:'#E1F5EE',hd:'#1D9E75',tx:'#085041',dot:'#0F6E56',cl:'Creator'},movie:{l:'Movies',sl:'Movie',e:'🎬',bg:'#E6F1FB',hd:'#378ADD',tx:'#0C447C',dot:'#185FA5',cl:'Director'},concert:{l:'Concerts',sl:'Concert',e:'🎸',bg:'#FAECE7',hd:'#D85A30',tx:'#712B13',dot:'#993C1D',cl:'Venue'}};
var SM={consuming:{l:'In progress',bg:'#639922',tx:'#fff'},backlog:{l:'Backlog',bg:'#888780',tx:'#fff'},completed:{l:'Completed',bg:'#185FA5',tx:'#fff'},dnf:{l:'DNF',bg:'#E24B4A',tx:'#fff'}};
/*DATA_START*/var data=[{id:1,type:'book',title:'Heated Rivalry',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-01-18'},{id:2,type:'book',title:'The Long Game',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-01-20'},{id:3,type:'book',title:'Game Changer',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-02-18'},{id:4,type:'book',title:'Tough Guy',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-02-19'},{id:5,type:'book',title:'Common Goal',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-02-21'},{id:6,type:'book',title:'Role Model',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-02-24'},{id:7,type:'book',title:'The Shots You Take',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-03-01'},{id:8,type:'book',title:'Time to Shine',creator:'Rachel Reid',status:'completed',rating:0,notes:'',date:'2026-03-07'},{id:9,type:'book',title:'We Could Be So Good',creator:'Cat Sebastian',status:'completed',rating:0,notes:'',date:'2026-03-20'},{id:10,type:'book',title:'You Should Be So Lucky',creator:'Cat Sebastian',status:'completed',rating:0,notes:'',date:'2026-03-24'},{id:11,type:'tv',title:'Extraordinary Attorney Woo',creator:'',status:'consuming',rating:0,notes:'',date:'2026-03-26'},{id:12,type:'tv',title:'Fleabag',creator:'Phoebe Waller-Bridge',status:'consuming',rating:0,notes:'',date:'2026-03-26'},{id:13,type:'concert',title:'Jason Isbell & the 400 Unit',creator:'Wang Theater, Boston',status:'completed',rating:0,notes:'',date:'2026-03-26'}];var nid=14;var imgCache={};/*DATA_END*/

var selR=0,fType='all',fStatus='all',editId=null;

function loadImg(e,cb){if(imgCache[e.id]!==undefined){cb(imgCache[e.id]);return;}if(e.type==='book'){var url='https://covers.openlibrary.org/b/title/'+encodeURIComponent(e.title)+'-M.jpg';var img=new Image();img.onload=function(){var src=img.naturalWidth>2?url:null;imgCache[e.id]=src;cb(src);};img.onerror=function(){imgCache[e.id]=null;cb(null);};img.src=url;}else if(e.type!=='concert'){var entity={music:'album',movie:'movie',tv:'tvSeason'}[e.type];var term=e.type==='music'?(e.creator+' '+e.title):e.title;fetch('https://itunes.apple.com/search?term='+encodeURIComponent(term)+'&entity='+entity+'&limit=1').then(function(r){return r.json();}).then(function(d){var art=d.results&&d.results[0]&&d.results[0].artworkUrl100;var src=art?art.replace('100x100bb','300x300bb'):null;imgCache[e.id]=src;cb(src);}).catch(function(){imgCache[e.id]=null;cb(null);});}else{imgCache[e.id]=null;cb(null);}}
function applyThumb(id,src){['th-','tp-'].forEach(function(pfx){var el=document.getElementById(pfx+id);if(el&&src)el.innerHTML='<img class="cthumb" src="'+src+'" onerror="this.style.display=\'none\'">';});}
function st(n,sz){sz=sz||13;var s='';for(var i=0;i<5;i++)s+='<span style="font-size:'+sz+'px;color:'+(i<n?'#EF9F27':'#ccc')+'">'+(i<n?'★':'☆')+'</span>';return s;}
function updLbl(){document.getElementById('clbl').textContent=CATS[document.getElementById('ft').value].cl;}
function setR(n){selR=n;rSI();}
function rSI(h){var n=h!=null?h:selR;var s='';for(var i=0;i<5;i++)s+='<span onclick="setR('+(i+1)+')" onmouseover="rSI('+(i+1)+')" onmouseout="rSI(null)" style="font-size:24px;cursor:pointer;color:'+(i<n?'#EF9F27':'#ccc')+'">'+(i<n?'★':'☆')+'</span>';document.getElementById('si').innerHTML=s;}
function openM(id){editId=id;var e=id!=null?data.filter(function(x){return x.id===id;})[0]:null;document.getElementById('mtitle').textContent=e?'Edit entry':'Add entry';document.getElementById('savebtn').textContent=e?'Update':'Save';document.getElementById('terr').style.display='none';if(e){document.getElementById('ftitle').value=e.title;document.getElementById('fcreator').value=e.creator;document.getElementById('fnotes').value=e.notes;var ftEl=document.getElementById('ft');for(var i=0;i<ftEl.options.length;i++)if(ftEl.options[i].value===e.type){ftEl.selectedIndex=i;break;}var fsEl=document.getElementById('fstatus');for(var j=0;j<fsEl.options.length;j++)if(fsEl.options[j].value===e.status){fsEl.selectedIndex=j;break;}selR=e.rating;}else{document.getElementById('ftitle').value='';document.getElementById('fcreator').value='';document.getElementById('fnotes').value='';document.getElementById('ft').selectedIndex=0;document.getElementById('fstatus').selectedIndex=0;selR=0;}updLbl();rSI();document.getElementById('mwrap').style.display='flex';setTimeout(function(){document.getElementById('ftitle').focus();},50);}
function closeM(){document.getElementById('mwrap').style.display='none';editId=null;}
function saveE(){var title=document.getElementById('ftitle').value.trim();if(!title){document.getElementById('terr').style.display='block';return;}var type=document.getElementById('ft').value,creator=document.getElementById('fcreator').value.trim(),status=document.getElementById('fstatus').value,notes=document.getElementById('fnotes').value.trim();if(editId!=null){for(var i=0;i<data.length;i++){if(data[i].id===editId){data[i].type=type;data[i].title=title;data[i].creator=creator;data[i].status=status;data[i].rating=selR;data[i].notes=notes;break;}}}else{data.unshift({id:nid++,type:type,title:title,creator:creator,status:status,rating:selR,notes:notes,date:new Date().toISOString().slice(0,10)});}closeM();render();}
function delE(id){if(!confirm('Remove?'))return;data=data.filter(function(e){return e.id!==id;});render();}
function setTF(t){fType=t;render();}
function setSF(s){fStatus=s;render();}

function render(){
  var total=data.length,done=data.filter(function(e){return e.status==='completed';}).length;
  var now=data.filter(function(e){return e.status==='consuming';}).length;
  var rated=data.filter(function(e){return e.rating>0;});
  var avg=rated.length?(rated.reduce(function(a,e){return a+e.rating;},0)/rated.length).toFixed(1):'—';
  document.getElementById('hdr-stats').innerHTML=[{v:total,l:'logged'},{v:done,l:'completed'},{v:now,l:'in progress'},{v:avg,l:'avg rating'}].map(function(s,i){return(i?'<span style="color:#7F77DD;opacity:.5;font-size:13px">·</span>':'')+'<div style="display:flex;align-items:baseline;gap:4px"><span style="font-size:20px;font-weight:500;color:#fff;line-height:1">'+s.v+'</span><span style="font-size:12px;color:#AFA9EC">'+s.l+'</span></div>';}).join('');
  var ks=Object.keys(CATS);var tH='';ks.forEach(function(k){var c=CATS[k];var it=data.filter(function(e){return e.type===k;});var dn=it.filter(function(e){return e.status==='completed';}).length;var nw=it.filter(function(e){return e.status==='consuming';}).length;var bl=it.filter(function(e){return e.status==='backlog';}).length;var df=it.filter(function(e){return e.status==='dnf';}).length;var rt=it.filter(function(e){return e.rating>0;});var avg2=rt.length?(rt.reduce(function(a,e){return a+e.rating;},0)/rt.length).toFixed(1):'—';var tot=it.length||1;var sel=fType===k;tH+='<div class="cat-tile'+(sel?' sel':'')+'" onclick="setTF(\''+(sel?'all':k)+'\')" style="background:'+c.bg+';border-color:'+(sel?c.dot:'transparent')+'"><div style="font-size:20px;line-height:1;margin-bottom:4px">'+c.e+'</div><div style="font-size:12px;font-weight:500;color:'+c.tx+';margin-bottom:1px">'+c.l+'</div><div style="font-size:24px;font-weight:500;color:'+c.hd+'">'+it.length+'</div><div style="height:5px;border-radius:3px;overflow:hidden;background:rgba(0,0,0,.08);display:flex;margin-top:5px"><div style="width:'+Math.round(dn/tot*100)+'%;height:100%;background:'+c.dot+'"></div><div style="width:'+Math.round(nw/tot*100)+'%;height:100%;background:'+c.hd+';opacity:.6"></div><div style="width:'+Math.round(bl/tot*100)+'%;height:100%;background:'+c.hd+';opacity:.25"></div><div style="width:'+Math.round(df/tot*100)+'%;height:100%;background:#E24B4A;opacity:.7"></div></div><div style="font-size:11px;color:'+c.tx+';opacity:.75;margin-top:4px">'+(avg2!=='—'?'★ '+avg2+' · ':'')+dn+' done</div></div>';});
  document.getElementById('tiles').innerHTML=tH;
  var maxC=1;ks.forEach(function(k){var n=data.filter(function(e){return e.type===k;}).length;if(n>maxC)maxC=n;});var cH='';ks.forEach(function(k){var c=CATS[k];var dn=data.filter(function(e){return e.type===k&&e.status==='completed';}).length;var nw=data.filter(function(e){return e.type===k&&e.status==='consuming';}).length;var bl=data.filter(function(e){return e.type===k&&e.status==='backlog';}).length;var df=data.filter(function(e){return e.type===k&&e.status==='dnf';}).length;var tot=dn+nw+bl+df;cH+='<div class="brow"><div style="width:62px;font-size:13px;color:var(--color-text-secondary);text-align:right;flex-shrink:0">'+c.l+'</div><div class="btrack"><div style="width:'+Math.round(dn/maxC*100)+'%;height:100%;background:#185FA5"></div><div style="width:'+Math.round(nw/maxC*100)+'%;height:100%;background:#639922"></div><div style="width:'+Math.round(bl/maxC*100)+'%;height:100%;background:#B4B2A9"></div><div style="width:'+Math.round(df/maxC*100)+'%;height:100%;background:#E24B4A;opacity:.8"></div></div><div style="width:22px;font-size:13px;color:var(--color-text-secondary)">'+tot+'</div></div>';});
  document.getElementById('cchart').innerHTML=cH;
  var ratedAll=data.filter(function(e){return e.rating>0;});var rD=[0,0,0,0,0];ratedAll.forEach(function(e){if(e.rating>=1&&e.rating<=5)rD[e.rating-1]++;});var maxR=Math.max.apply(null,rD)||1;var rColors=['#F09595','#FAC775','#EF9F27','#BA7517','#534AB7'];var rH='';rD.forEach(function(cnt,i){var p=Math.round(cnt/maxR*80);rH+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px"><div style="font-size:12px;color:var(--color-text-secondary);min-height:16px">'+(cnt||'')+'</div><div style="width:100%;height:'+p+'px;background:'+rColors[i]+';border-radius:3px 3px 0 0;min-height:'+(cnt?4:0)+'px"></div><div style="font-size:12px;color:var(--color-text-secondary)">'+(i+1)+'★</div></div>';});
  document.getElementById('rchart').innerHTML=rH;
  var tops=data.filter(function(e){return e.rating>=4;}).sort(function(a,b){return b.rating-a.rating||b.date.localeCompare(a.date);}).slice(0,10);
  if(tops.length){var tpH='<div style="display:flex;flex-wrap:wrap;gap:8px">';tops.forEach(function(e){var c=CATS[e.type];var cached=imgCache[e.id];var ti=cached?'<img class="cthumb" src="'+cached+'" onerror="this.style.display=\'none\'">':'<span style="font-size:20px">'+c.e+'</span>';tpH+='<div style="display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:6px 12px 6px 6px"><div id="tp-'+e.id+'" style="width:42px;height:42px;border-radius:6px;flex-shrink:0;background:'+c.bg+';display:flex;align-items:center;justify-content:center;overflow:hidden">'+ti+'</div><div><div style="font-size:14px;font-weight:500;color:var(--color-text-primary);max-width:120px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+e.title+'</div><div>'+st(e.rating,12)+'</div></div></div>';});tpH+='</div>';document.getElementById('tops').innerHTML=tpH;}
  else{document.getElementById('tops').innerHTML='<div style="font-size:14px;color:var(--color-text-tertiary)">Rate something 4+ stars to see it here.</div>';}
  var sH='';[['all','All'],['consuming','In progress'],['backlog','Backlog'],['completed','Done'],['dnf','DNF']].forEach(function(p){var on=fStatus===p[0];var bg=on?(p[0]==='all'?'#534AB7':SM[p[0]].bg):'transparent';sH+='<button class="tbtn'+(on?' on':'')+'" onclick="setSF(\''+p[0]+'\')" style="background:'+bg+';color:'+(on?'#fff':'var(--color-text-secondary)')+'">'+p[1]+'</button>';});
  document.getElementById('stabs').innerHTML=sH;
  var f=data.filter(function(e){return(fType==='all'||e.type===fType)&&(fStatus==='all'||e.status===fStatus);});
  var srt=document.getElementById('srt').value;if(srt==='d-')f.sort(function(a,b){return b.date.localeCompare(a.date);});else if(srt==='d+')f.sort(function(a,b){return a.date.localeCompare(b.date);});else if(srt==='r-')f.sort(function(a,b){return b.rating-a.rating;});else f.sort(function(a,b){return a.title.localeCompare(b.title);});
  document.getElementById('cnt').textContent=f.length+' '+(f.length===1?'entry':'entries');
  if(!f.length){document.getElementById('cards').innerHTML='';document.getElementById('empty').style.display='block';return;}
  document.getElementById('empty').style.display='none';
  var ch='';f.forEach(function(e){var c=CATS[e.type],s=SM[e.status];var dnfS=e.status==='dnf'?'repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(226,75,74,.15) 4px,rgba(226,75,74,.15) 8px)':'';var cached=imgCache[e.id];var ti=cached?'<img class="cthumb" src="'+cached+'" onerror="this.style.display=\'none\'">':'<span style="font-size:34px">'+c.e+'</span>';ch+='<div class="sc"><div style="width:100%;padding-top:100%;position:relative;background:'+c.bg+(dnfS?';background-image:'+dnfS:'')+'"><div id="th-'+e.id+'" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden">'+ti+'</div><div style="position:absolute;top:6px;left:6px"><span class="pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.sl+'</span></div><div style="position:absolute;top:5px;right:5px;display:flex;gap:3px"><button class="icnbtn" onclick="openM('+e.id+')" style="background:'+c.bg+';color:'+c.tx+'" title="Edit">✎</button><button class="icnbtn" onclick="delE('+e.id+')" style="background:'+c.bg+';color:'+c.tx+'" title="Remove">×</button></div></div><div style="padding:.75rem"><div style="font-size:14px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">'+e.title+'</div>'+(e.creator?'<div style="font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">'+e.creator+'</div>':'')+'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:3px">'+(e.rating?'<div>'+st(e.rating,12)+'</div>':'<div style="font-size:12px;color:var(--color-text-tertiary)">unrated</div>')+'<span class="pill" style="background:'+s.bg+';color:'+s.tx+'">'+s.l+'</span></div>'+(e.notes?'<div style="font-size:12px;color:var(--color-text-secondary);margin-top:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+e.notes+'</div>':'')+'</div></div>';});
  document.getElementById('cards').innerHTML=ch;
  f.forEach(function(e){if(imgCache[e.id]===undefined){(function(en){loadImg(en,function(src){if(src)applyThumb(en.id,src);});})(e);}});
  tops.forEach(function(e){if(imgCache[e.id]===undefined){(function(en){loadImg(en,function(src){if(src)applyThumb(en.id,src);});})(e);}});
}

function doExport(){
  var newData='/*DATA_START*/var data='+JSON.stringify(data)+';var nid='+nid+';var imgCache='+JSON.stringify(imgCache)+';/*DATA_END*/';
  var date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  var src=document.documentElement.outerHTML;
  src=src.replace(/\/\*DATA_START\*\/[\s\S]*?\/\*DATA_END\*\//,newData);
  src=src.replace(/Last updated [^<]*/,'Last updated '+date);
  var b=new Blob(['<!DOCTYPE html>\n'+src],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='media-log.html';document.body.appendChild(a);a.click();document.body.removeChild(a);
}
