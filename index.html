<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grace's 2026 Media Log</title>
<link rel="stylesheet" href="https://unpkg.com/@fontsource/playfair-display@5.0.18/700.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:17px;background:#F1EFE8;color:#1a1a18;padding:2rem 1.5rem;max-width:960px;margin:0 auto}
.tbtn{background:transparent;border:none;padding:6px 14px;cursor:pointer;font-size:14px;border-radius:20px;font-family:inherit;color:#555}
.tbtn.on{font-weight:500;color:#fff}
.cat-tile{border-radius:12px;padding:.9rem 1rem;cursor:pointer;border:2px solid transparent}
.cat-tile:hover{opacity:.85}
.cat-tile.sel{border-color:rgba(0,0,0,.25)}
.sc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;line-height:1.5}
.acrd{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem 1.25rem}
.mwrap{display:none;background:rgba(0,0,0,.5);border-radius:12px;margin-bottom:1.5rem;padding:1.5rem;align-items:flex-start;justify-content:center;min-height:440px}
.mbox{background:#fff;border-radius:12px;border:0.5px solid rgba(0,0,0,.1);padding:1.5rem;width:100%;max-width:400px}
input,select,textarea{box-sizing:border-box;width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;margin:0}
button{padding:8px 16px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;background:#fff}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.btrack{flex:1;height:14px;border-radius:3px;background:rgba(0,0,0,.07);overflow:hidden;display:flex}
.icnbtn{border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;padding:0;display:flex;align-items:center;justify-content:center;font-family:inherit;opacity:.85}
.icnbtn:hover{opacity:1}
.cthumb{width:100%;height:100%;object-fit:cover;display:block}
#status{font-size:12px;color:#AFA9EC;margin-top:.4rem;min-height:16px}
.consuming-wrap{padding:1rem 1.5rem 0;display:none}
.consuming-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#AFA9EC;margin-bottom:.6rem}
.consuming-items{display:flex;gap:10px;flex-wrap:wrap}
.consuming-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:10px;padding:6px 10px 6px 6px;cursor:pointer;transition:background .15s}
.consuming-item:hover{background:rgba(255,255,255,.15)}
.consuming-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:18px}
.consuming-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.consuming-title{font-size:13px;font-weight:500;color:#fff;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.consuming-type{font-size:11px;color:#AFA9EC;margin-top:1px}
.carousel-wrap{overflow:hidden;width:100%;margin-top:1rem;mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%)}
.carousel-track{display:flex;gap:8px;width:max-content;animation:scroll-left 40s linear infinite}
.carousel-track:hover{animation-play-state:paused}
@keyframes scroll-left{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.carousel-img{width:52px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0;opacity:.85;transition:opacity .2s}
.carousel-img:hover{opacity:1}
</style>
</head>
<body>

<div id="mwrap" class="mwrap">
  <div class="mbox">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <span id="mtitle" style="font-size:16px;font-weight:500">Add entry</span>
      <button onclick="closeM()" style="background:none;border:none;cursor:pointer;font-size:22px;line-height:1;padding:0">&times;</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Type</div>
        <select id="ft" onchange="updLbl()">
          <option value="book">Book</option>
          <option value="music">Music / album</option>
          <option value="tv">TV show</option>
          <option value="movie">Movie</option>
          <option value="concert">Live Event</option>
        </select>
      </div>
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Title</div>
        <input id="ftitle" type="text" placeholder="Title...">
        <div id="terr" style="font-size:13px;color:#c00;margin-top:3px;display:none">Required.</div>
      </div>
      <div><div id="clbl" style="font-size:13px;color:#666;margin-bottom:3px">Author</div><input id="fcreator" type="text"></div>
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Status</div>
        <select id="fstatus" onchange="toggleDateFinished()">
          <option value="consuming">Currently consuming</option>
          <option value="backlog">Backlog / want to</option>
          <option value="completed">Completed</option>
          <option value="dnf">Did not finish</option>
        </select>
      </div>
      <div id="date-finished-field" style="display:none"><div style="font-size:13px;color:#666;margin-bottom:3px">Date finished</div><input id="fdatefinished" type="date"></div>
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Rating</div>
        <div id="si" style="display:flex;gap:2px"></div>
      </div>
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Notes</div><textarea id="fnotes" rows="2" style="resize:vertical"></textarea></div>
      <div><div style="font-size:13px;color:#666;margin-bottom:3px">Image URL <span style="font-weight:400;opacity:.6">(optional — overrides auto-fetch)</span></div><input id="fimgurl" type="url" placeholder="https://..."></div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="saveE()" style="flex:1" id="savebtn">Save</button>
        <button onclick="closeM()" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div style="border-radius:12px;overflow:hidden;margin-bottom:1.5rem;background:#26215C">
  <div style="display:flex;height:6px">
    <div style="flex:1;background:#BA7517"></div>
    <div style="flex:1;background:#7F77DD"></div>
    <div style="flex:1;background:#1D9E75"></div>
    <div style="flex:1;background:#378ADD"></div>
    <div style="flex:1;background:#D85A30"></div>
  </div>
  <div style="padding:1.4rem 1.5rem .75rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
      <div>
        <div style="font-size:12px;font-weight:500;letter-spacing:.12em;color:#AFA9EC;text-transform:uppercase;margin-bottom:.2rem">Grace's</div>
        <div style="font-family:'Playfair Display',Georgia,serif;font-size:38px;font-weight:700;color:#fff;line-height:1;margin-bottom:.8rem">2026 Media Log</div>
        <div id="hdr-stats" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center"></div>
        <div id="status">Connecting...</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:4px">
        <button onclick="openM(null)" style="font-size:13px;background:#7F77DD;border-color:#7F77DD;color:#fff;font-weight:500">+ Add</button>
      </div>
    </div>
  </div>
  <div class="consuming-wrap" id="consuming-wrap">
    <div class="consuming-label">Currently Consuming</div>
    <div class="consuming-items" id="consuming-items"></div>
  </div>
  <div class="carousel-wrap" id="carousel-wrap" style="display:none;padding:0 1.5rem 1.2rem">
    <div class="carousel-track" id="carousel-track"></div>
  </div>
</div>

<div id="tiles" style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:1.5rem"></div>

<div style="display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:12px;margin-bottom:12px">
  <div class="acrd">
    <div style="font-size:13px;color:#666;margin-bottom:.85rem">By category</div>
    <div id="cchart"></div>
    <div style="display:flex;gap:12px;margin-top:.75rem;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#185FA5;display:inline-block"></span>Done</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#639922;display:inline-block"></span>Now</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#B4B2A9;display:inline-block"></span>Backlog</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#E24B4A;display:inline-block"></span>DNF</span>
    </div>
  </div>
  <div class="acrd">
    <div style="font-size:13px;color:#666;margin-bottom:.85rem">Ratings</div>
    <div id="rchart" style="display:flex;align-items:flex-end;gap:4px;height:100px"></div>
  </div>
</div>

<div class="acrd" style="margin-bottom:1.5rem">
  <div style="font-size:13px;color:#666;margin-bottom:.75rem">Top picks (5 stars)</div>
  <div id="tops"></div>
</div>

<div style="margin-bottom:.75rem">
  <input id="search" type="text" placeholder="Search titles, authors, notes..." oninput="render()" style="width:100%;padding:8px 12px;border:0.5px solid rgba(0,0,0,.15);border-radius:8px;font-size:14px;font-family:inherit;background:#fff">
</div>
<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:.75rem">
  <span style="font-size:13px;color:#999;margin-right:2px">Filter:</span>
  <div id="stabs" style="display:flex;flex-wrap:wrap;gap:5px"></div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <span id="cnt" style="font-size:14px;color:#666"></span>
  <select id="srt" onchange="render()" style="font-size:13px;width:auto">
    <option value="d-">Newest first</option>
    <option value="d+">Oldest first</option>
    <option value="r-">Top rated</option>
    <option value="az">A-Z</option>
    <option value="df-">Date finished (newest)</option>
    <option value="df+">Date finished (oldest)</option>
  </select>
</div>
<div id="cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px"></div>
<div id="empty" style="display:none;text-align:center;padding:3rem;color:#999">Nothing here yet.</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC9tQzabbPW07TPmGwfG-1BJKlG2-C2QY4",
  authDomain:"media-log-14b40.firebaseapp.com",
  projectId:"media-log-14b40",
  storageBucket:"media-log-14b40.firebasestorage.app",
  messagingSenderId:"1015074403444",
  appId:"1:1015074403444:web:886eb5875911029c928d21"
});
var db=firebase.firestore();
var col=db.collection('entries');

var CATS={
  book:    {l:'Books',    sl:'Book',    e:'📚',bg:'#FAEEDA',hd:'#EF9F27',tx:'#633806',dot:'#BA7517',cl:'Author'},
  music:   {l:'Music',   sl:'Music',   e:'🎵',bg:'#EEEDFE',hd:'#7F77DD',tx:'#3C3489',dot:'#534AB7',cl:'Artist'},
  tv:      {l:'TV',      sl:'TV show', e:'📺',bg:'#E1F5EE',hd:'#1D9E75',tx:'#085041',dot:'#0F6E56',cl:'Creator'},
  movie:   {l:'Movies',  sl:'Movie',   e:'🎬',bg:'#E6F1FB',hd:'#378ADD',tx:'#0C447C',dot:'#185FA5',cl:'Director'},
  concert: {l:'Live Events',sl:'Live Event', e:'🎸',bg:'#FAECE7',hd:'#D85A30',tx:'#712B13',dot:'#993C1D',cl:'Venue'}
};
var SM={
  consuming:{l:'In progress',bg:'#639922',tx:'#fff'},
  backlog:  {l:'Backlog',    bg:'#888780',tx:'#fff'},
  completed:{l:'Completed',  bg:'#185FA5',tx:'#fff'},
  dnf:      {l:'DNF',        bg:'#E24B4A',tx:'#fff'}
};

var data=[],selR=0,fType='all',fStatus='all',editId=null,imgCache={};

function setStatus(m){document.getElementById('status').textContent=m;}

col.orderBy('date','desc').onSnapshot(function(snap){
  data=[];
  snap.forEach(function(doc){var d=doc.data();d.id=doc.id;data.push(d);});
  setStatus('');render();
},function(err){setStatus('Connection error.');console.error(err);});

function loadImg(e,cb){
  if(imgCache[e.id]!==undefined){cb(imgCache[e.id]);return;}
  if(e.imgurl){imgCache[e.id]=e.imgurl;cb(e.imgurl);return;}
  if(e.type==='book'){
    var term=encodeURIComponent(e.title+(e.creator?' '+e.creator:''));
    fetch('https://itunes.apple.com/search?term='+term+'&entity=ebook&limit=5')
      .then(function(r){return r.json();})
      .then(function(d){
        var src=null;
        if(d.results&&d.results.length){
          for(var i=0;i<d.results.length;i++){
            var r=d.results[i];
            if(r.artworkUrl100&&r.trackName&&r.trackName.toLowerCase().indexOf(e.title.toLowerCase())!==-1){
              src=r.artworkUrl100.replace('100x100bb','600x600bb');
              break;
            }
          }
          if(!src&&d.results[0]&&d.results[0].artworkUrl100){
            src=d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
          }
        }
        imgCache[e.id]=src;cb(src);
      }).catch(function(){imgCache[e.id]=null;cb(null);});
  } else if(e.type==='tv'){
    fetch('https://api.tvmaze.com/singlesearch/shows?q='+encodeURIComponent(e.title))
      .then(function(r){return r.json();})
      .then(function(d){
        var src=null;
        if(d&&d.image){
          src=(d.image.original||d.image.medium||null);
          if(src) src=src.replace('http://','https://');
        }
        imgCache[e.id]=src;cb(src);
      }).catch(function(){imgCache[e.id]=null;cb(null);});
  } else if(e.type==='movie'||e.type==='music'){
    var entity=e.type==='music'?'album':'movie';
    var term=e.type==='music'?(e.creator+' '+e.title):e.title;
    fetch('https://itunes.apple.com/search?term='+encodeURIComponent(term)+'&entity='+entity+'&limit=3')
      .then(function(r){return r.json();})
      .then(function(d){
        var src=null;
        if(d.results&&d.results[0]&&d.results[0].artworkUrl100){
          src=d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
        }
        imgCache[e.id]=src;cb(src);
      }).catch(function(){imgCache[e.id]=null;cb(null);});
  } else {
    imgCache[e.id]=null;cb(null);
  }
}

function applyThumb(id,src){
  ['th-','tp-'].forEach(function(p){
    var el=document.getElementById(p+id);
    if(el&&src)el.innerHTML='<img class="cthumb" src="'+src+'" onerror="this.style.display=\'none\'">';
  });
}

function st(n,sz){
  sz=sz||14;var s='';
  for(var i=0;i<5;i++) s+='<span style="font-size:'+sz+'px;color:'+(i<n?'#EF9F27':'#ccc')+'">'+(i<n?'★':'☆')+'</span>';
  return s;
}

function updLbl(){document.getElementById('clbl').textContent=CATS[document.getElementById('ft').value].cl;}

function toggleDateFinished(){
  var status=document.getElementById('fstatus').value;
  var field=document.getElementById('date-finished-field');
  field.style.display=(status==='completed'||status==='dnf')?'block':'none';
  if(status==='completed'&&!document.getElementById('fdatefinished').value){
    document.getElementById('fdatefinished').value=new Date().toISOString().slice(0,10);
  }
}

function initStars(){
  var si=document.getElementById('si');
  si.innerHTML='';
  for(var i=0;i<5;i++){
    (function(idx){
      var btn=document.createElement('button');
      btn.type='button';
      btn.textContent='☆';
      btn.style.cssText='background:none;border:none;font-size:26px;cursor:pointer;color:#ccc;padding:2px;line-height:1';
      btn.addEventListener('click',function(){selR=idx+1;paintStars(selR);});
      btn.addEventListener('mouseover',function(){paintStars(idx+1);});
      btn.addEventListener('mouseout',function(){paintStars(selR);});
      si.appendChild(btn);
    })(i);
  }
}

function paintStars(active){
  var btns=document.getElementById('si').children;
  for(var i=0;i<btns.length;i++){
    btns[i].textContent=i<active?'★':'☆';
    btns[i].style.color=i<active?'#EF9F27':'#ccc';
  }
}

function drawStars(active){
  if(!document.getElementById('si').children.length) initStars();
  paintStars(active);
}

function openM(id){
  editId=id;
  var e=id?data.filter(function(x){return x.id===id;})[0]:null;
  document.getElementById('mtitle').textContent=e?'Edit entry':'Add entry';
  document.getElementById('savebtn').textContent=e?'Update':'Save';
  document.getElementById('terr').style.display='none';
  if(e){
    document.getElementById('ftitle').value=e.title;
    document.getElementById('fcreator').value=e.creator||'';
    document.getElementById('fnotes').value=e.notes||'';
    document.getElementById('fimgurl').value=e.imgurl||'';
    document.getElementById('fdatefinished').value=e.datefinished||'';
    var ftEl=document.getElementById('ft');
    for(var i=0;i<ftEl.options.length;i++) if(ftEl.options[i].value===e.type){ftEl.selectedIndex=i;break;}
    var fsEl=document.getElementById('fstatus');
    for(var j=0;j<fsEl.options.length;j++) if(fsEl.options[j].value===e.status){fsEl.selectedIndex=j;break;}
    selR=e.rating||0;
  } else {
    document.getElementById('ftitle').value='';
    document.getElementById('fcreator').value='';
    document.getElementById('fnotes').value='';
    document.getElementById('fimgurl').value='';
    document.getElementById('fdatefinished').value='';
    document.getElementById('ft').selectedIndex=0;
    document.getElementById('fstatus').selectedIndex=0;
    selR=0;
  }
  updLbl();toggleDateFinished();initStars();paintStars(selR);
  document.getElementById('mwrap').style.display='flex';
  setTimeout(function(){document.getElementById('ftitle').focus();},50);
}

function closeM(){document.getElementById('mwrap').style.display='none';editId=null;}

function saveE(){
  var title=document.getElementById('ftitle').value.trim();
  if(!title){document.getElementById('terr').style.display='block';return;}
  var savedRating=selR;
  var savedEditId=editId;
  var entry={
    type:document.getElementById('ft').value,
    title:title,
    creator:document.getElementById('fcreator').value.trim(),
    status:document.getElementById('fstatus').value,
    rating:savedRating,
    notes:document.getElementById('fnotes').value.trim(),
    imgurl:document.getElementById('fimgurl').value.trim(),
    datefinished:document.getElementById('fdatefinished').value||'',
    date:new Date().toISOString().slice(0,10)
  };
  closeM();
  setStatus('Saving...');
  var p=savedEditId?col.doc(savedEditId).set(entry):col.add(entry);
  p.then(function(){setStatus('Saved.');setTimeout(function(){setStatus('');},2000);})
   .catch(function(err){setStatus('Error: '+err.message);console.error(err);});
}

function delE(id){
  if(!confirm('Remove this entry?'))return;
  col.doc(id).delete().catch(function(err){setStatus('Error: '+err.message);});
}

function setTF(t){fType=t;render();}
function setSF(s){fStatus=s;render();}

function render(){
  var total=data.length;
  var done=data.filter(function(e){return e.status==='completed';}).length;
  var now=data.filter(function(e){return e.status==='consuming';}).length;
  var rated=data.filter(function(e){return e.rating>0;});
  var avg=rated.length?(rated.reduce(function(a,e){return a+e.rating;},0)/rated.length).toFixed(1):'—';
  document.getElementById('hdr-stats').innerHTML=[
    {v:total,l:'logged'},{v:done,l:'completed'},{v:now,l:'in progress'},{v:avg,l:'avg rating'}
  ].map(function(s,i){
    return (i?'<span style="color:#7F77DD;opacity:.5;font-size:13px">·</span>':'')
      +'<div style="display:flex;align-items:baseline;gap:4px"><span style="font-size:20px;font-weight:500;color:#fff;line-height:1">'+s.v+'</span><span style="font-size:12px;color:#AFA9EC">'+s.l+'</span></div>';
  }).join('');

  var ks=Object.keys(CATS);var tH='';
  ks.forEach(function(k){
    var c=CATS[k];var it=data.filter(function(e){return e.type===k;});
    var dn=it.filter(function(e){return e.status==='completed';}).length;
    var nw=it.filter(function(e){return e.status==='consuming';}).length;
    var bl=it.filter(function(e){return e.status==='backlog';}).length;
    var df=it.filter(function(e){return e.status==='dnf';}).length;
    var rt=it.filter(function(e){return e.rating>0;});
    var a2=rt.length?(rt.reduce(function(a,e){return a+e.rating;},0)/rt.length).toFixed(1):'—';
    var tot=it.length||1;var sel=fType===k;
    tH+='<div class="cat-tile'+(sel?' sel':'')+'" onclick="setTF(\''+(sel?'all':k)+'\')" style="background:'+c.bg+';border-color:'+(sel?c.dot:'transparent')+'">'
      +'<div style="font-size:20px;line-height:1;margin-bottom:4px">'+c.e+'</div>'
      +'<div style="font-size:12px;font-weight:500;color:'+c.tx+';margin-bottom:1px">'+c.l+'</div>'
      +'<div style="font-size:24px;font-weight:500;color:'+c.hd+'">'+it.length+'</div>'
      +'<div style="height:5px;border-radius:3px;overflow:hidden;background:rgba(0,0,0,.08);display:flex;margin-top:5px">'
        +'<div style="width:'+Math.round(dn/tot*100)+'%;height:100%;background:'+c.dot+'"></div>'
        +'<div style="width:'+Math.round(nw/tot*100)+'%;height:100%;background:'+c.hd+';opacity:.6"></div>'
        +'<div style="width:'+Math.round(bl/tot*100)+'%;height:100%;background:'+c.hd+';opacity:.25"></div>'
        +'<div style="width:'+Math.round(df/tot*100)+'%;height:100%;background:#E24B4A;opacity:.7"></div>'
      +'</div>'
      +'<div style="font-size:11px;color:'+c.tx+';opacity:.75;margin-top:4px">'+(a2!=='—'?'★ '+a2+' · ':'')+dn+' done</div>'
    +'</div>';
  });
  document.getElementById('tiles').innerHTML=tH;

  var maxC=1;
  ks.forEach(function(k){var n=data.filter(function(e){return e.type===k;}).length;if(n>maxC)maxC=n;});
  var cH='';
  ks.forEach(function(k){
    var c=CATS[k];
    var dn=data.filter(function(e){return e.type===k&&e.status==='completed';}).length;
    var nw=data.filter(function(e){return e.type===k&&e.status==='consuming';}).length;
    var bl=data.filter(function(e){return e.type===k&&e.status==='backlog';}).length;
    var df=data.filter(function(e){return e.type===k&&e.status==='dnf';}).length;
    var tot=dn+nw+bl+df;
    cH+='<div class="brow"><div style="width:62px;font-size:13px;color:#666;text-align:right;flex-shrink:0">'+c.l+'</div>'
      +'<div class="btrack">'
        +'<div style="width:'+Math.round(dn/maxC*100)+'%;height:100%;background:#185FA5"></div>'
        +'<div style="width:'+Math.round(nw/maxC*100)+'%;height:100%;background:#639922"></div>'
        +'<div style="width:'+Math.round(bl/maxC*100)+'%;height:100%;background:#B4B2A9"></div>'
        +'<div style="width:'+Math.round(df/maxC*100)+'%;height:100%;background:#E24B4A;opacity:.8"></div>'
      +'</div>'
      +'<div style="width:22px;font-size:13px;color:#666">'+tot+'</div></div>';
  });
  document.getElementById('cchart').innerHTML=cH;

  var ra=data.filter(function(e){return e.rating>0;});
  var rD=[0,0,0,0,0];
  ra.forEach(function(e){if(e.rating>=1&&e.rating<=5)rD[e.rating-1]++;});
  var maxR=Math.max.apply(null,rD)||1;
  var rColors=['#F09595','#FAC775','#EF9F27','#BA7517','#534AB7'];
  var rH='';
  rD.forEach(function(cnt,i){
    var p=Math.round(cnt/maxR*80);
    rH+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px">'
      +'<div style="font-size:12px;color:#666;min-height:16px">'+(cnt||'')+'</div>'
      +'<div style="width:100%;height:'+p+'px;background:'+rColors[i]+';border-radius:3px 3px 0 0;min-height:'+(cnt?4:0)+'px"></div>'
      +'<div style="font-size:12px;color:#666">'+(i+1)+'★</div>'
    +'</div>';
  });
  document.getElementById('rchart').innerHTML=rH;

  var tops=data.filter(function(e){return e.rating>=5;})
    .sort(function(a,b){return b.date.localeCompare(a.date);})
    .slice(0,10);
  if(tops.length){
    var tpH='<div style="display:flex;flex-wrap:wrap;gap:8px">';
    tops.forEach(function(e){
      var c=CATS[e.type];var cached=imgCache[e.id];
      var ti=cached?'<img class="cthumb" src="'+cached+'" onerror="this.style.display=\'none\'">':'<span style="font-size:20px">'+c.e+'</span>';
      tpH+='<div style="display:flex;align-items:center;gap:8px;background:#F1EFE8;border-radius:8px;padding:6px 12px 6px 6px">'
        +'<div id="tp-'+e.id+'" style="width:42px;height:42px;border-radius:6px;flex-shrink:0;background:'+c.bg+';display:flex;align-items:center;justify-content:center;overflow:hidden">'+ti+'</div>'
        +'<div><div style="font-size:14px;font-weight:500;max-width:120px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">'+e.title+'</div>'
        +'<div>'+st(e.rating,12)+'</div></div></div>';
    });
    tpH+='</div>';
    document.getElementById('tops').innerHTML=tpH;
  } else {
    document.getElementById('tops').innerHTML='<div style="font-size:14px;color:#999">Rate something 5 stars to see it here.</div>';
  }

  var sH='';
  [['all','All'],['consuming','In progress'],['backlog','Backlog'],['completed','Done'],['dnf','DNF']].forEach(function(p){
    var on=fStatus===p[0];
    var bg=on?(p[0]==='all'?'#534AB7':SM[p[0]].bg):'transparent';
    sH+='<button class="tbtn'+(on?' on':'')+'" onclick="setSF(\''+p[0]+'\')" style="background:'+bg+';color:'+(on?'#fff':'#555')+'">'+p[1]+'</button>';
  });
  document.getElementById('stabs').innerHTML=sH;

  var q=(document.getElementById('search')?document.getElementById('search').value.trim().toLowerCase():'');
  var f=data.filter(function(e){
    if(fType!=='all'&&e.type!==fType) return false;
    if(fStatus!=='all'&&e.status!==fStatus) return false;
    if(q){
      var hay=(e.title+' '+(e.creator||'')+' '+(e.notes||'')).toLowerCase();
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  });
  var srt=document.getElementById('srt').value;
  if(srt==='d-') f.sort(function(a,b){return b.date.localeCompare(a.date);});
  else if(srt==='d+') f.sort(function(a,b){return a.date.localeCompare(b.date);});
  else if(srt==='r-') f.sort(function(a,b){return b.rating-a.rating;});
  else if(srt==='df-') f.sort(function(a,b){return (b.datefinished||'').localeCompare(a.datefinished||'');});
  else if(srt==='df+') f.sort(function(a,b){return (a.datefinished||'').localeCompare(b.datefinished||'');});
  else f.sort(function(a,b){return a.title.localeCompare(b.title);});

  document.getElementById('cnt').textContent=f.length+' '+(f.length===1?'entry':'entries');
  if(!f.length){document.getElementById('cards').innerHTML='';document.getElementById('empty').style.display='block';return;}
  document.getElementById('empty').style.display='none';

  var ch='';
  f.forEach(function(e){
    var c=CATS[e.type],s=SM[e.status];
    var dnfS=e.status==='dnf'?'repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(226,75,74,.15) 4px,rgba(226,75,74,.15) 8px)':'';
    var cached=imgCache[e.id];
    var ti=cached?'<img class="cthumb" src="'+cached+'" onerror="this.style.display=\'none\'">':'<span style="font-size:34px">'+c.e+'</span>';
    ch+='<div class="sc">'
      +'<div style="width:100%;padding-top:100%;position:relative;background:'+c.bg+(dnfS?';background-image:'+dnfS:'')+'">'
        +'<div id="th-'+e.id+'" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden">'+ti+'</div>'
        +'<div style="position:absolute;top:6px;left:6px"><span class="pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.sl+'</span></div>'
        +'<div style="position:absolute;top:5px;right:5px;display:flex;gap:3px">'
          +'<button class="icnbtn" onclick="openM(\''+e.id+'\')" style="background:'+c.bg+';color:'+c.tx+'" title="Edit">✎</button>'
          +'<button class="icnbtn" onclick="delE(\''+e.id+'\')" style="background:'+c.bg+';color:'+c.tx+'" title="Remove">×</button>'
        +'</div>'
      +'</div>'
      +'<div style="padding:.75rem">'
        +'<div style="font-size:15px;font-weight:500;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">'+e.title+'</div>'
        +(e.creator?'<div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">'+e.creator+'</div>':'')
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:3px">'
          +(e.rating?'<div>'+st(e.rating,12)+'</div>':'<div style="font-size:12px;color:#aaa">unrated</div>')
          +'<span class="pill" style="background:'+s.bg+';color:'+s.tx+'">'+s.l+'</span>'
        +'</div>'
        +(e.datefinished?'<div style="font-size:11px;color:#aaa;margin-top:4px">✓ '+e.datefinished+'</div>':'')
        +(e.notes?'<div style="font-size:12px;color:#888;margin-top:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+e.notes+'</div>':'')
      +'</div>'
    +'</div>';
  });
  document.getElementById('cards').innerHTML=ch;

  f.forEach(function(e){
    if(imgCache[e.id]===undefined){
      (function(en){loadImg(en,function(src){if(src)applyThumb(en.id,src);updateCarousel();updateConsuming();});})(e);
    }
  });
  tops.forEach(function(e){
    if(imgCache[e.id]===undefined){
      (function(en){loadImg(en,function(src){if(src)applyThumb(en.id,src);});})(e);
    }
  });
  updateCarousel();
  updateConsuming();
}

function updateCarousel(){
  var imgs=Object.values(imgCache).filter(function(s){return s;});
  if(!imgs.length){document.getElementById('carousel-wrap').style.display='none';return;}
  // Duplicate for seamless loop
  var all=imgs.concat(imgs);
  document.getElementById('carousel-track').innerHTML=all.map(function(src){
    return '<img class="carousel-img" src="'+src+'" onerror="this.style.display=\'none\'">';
  }).join('');
  document.getElementById('carousel-wrap').style.display='block';
  // Adjust speed based on count
  var spd=Math.max(20,imgs.length*3);
  document.getElementById('carousel-track').style.animationDuration=spd+'s';
}

function updateConsuming(){
  var items=data.filter(function(e){return e.status==='consuming';});
  var wrap=document.getElementById('consuming-wrap');
  var container=document.getElementById('consuming-items');
  if(!items.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  container.innerHTML='';
  items.forEach(function(e){
    var c=CATS[e.type];
    var cached=imgCache[e.id];
    var thumbInner=cached?('<img src="'+cached+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px">'):('<span>'+c.e+'</span>');
    var div=document.createElement('div');
    div.className='consuming-item';
    div.title='Edit';
    div.setAttribute('data-id',e.id);
    div.innerHTML='<div class="consuming-thumb">'+thumbInner+'</div>'
      +'<div><div class="consuming-title">'+e.title+'</div>'
      +'<div class="consuming-type">'+c.sl+'</div></div>';
    div.addEventListener('click',function(){openM(e.id);});
    container.appendChild(div);
  });
}
</script>
</body>
</html>
